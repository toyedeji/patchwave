version: phase1
generated: 2026-06-17
snapshot_prefix: patchwave
patch_scope: security-only
honor_holds: true
os_packages_only: true

# snap_strategy values (per-CT, decided by bind topology + pre_state):
#   no-bind                — plain `pct snapshot` works; full rollback available.
#   detach-snap-attach     — stopped CT with ro-only binds; detach mp*, snap,
#                            patch with binds detached, reattach unconditionally
#                            on every exit path. NOT YET IMPLEMENTED in pipeline;
#                            runs against these CTs will refuse cleanly until built.
#   fix-forward-enhanced   — running CT with ro-only binds; detach would need a
#                            restart, so we patch in place without a snapshot.
#                            Recovery is `pre_patch_capture` (versions + dpkg/apt
#                            baseline) + retain old debs (no apt-get clean) so
#                            operator can manually downgrade if a regression hits.
#                            Reported as "patched WITHOUT snapshot protection".
#   deferred               — rw data binds present; snapshot+rollback semantics
#                            don't fit; runner refuses to patch until the rw-bind
#                            data-survival contract is signed off per CT.

policy:
  approval_gated_tier3: [100, 103, 125, 140, 211, 777, 1906]
  never_auto: [125, 211]
  stay_stopped: [103]

tier_order: [0, 1, 2, 3]

# Probe schema: probes are described by (scheme, port, path).
# Runner derives the IP from `pct config <ctid>` at execution time —
# no hardcoded IPs here.
cts:
  - {ctid: 109,  node: node2, name: splunk-enterprise,       tier: 0, pre_state: stopped, snap_strategy: no-bind,             probes: {tcp: [8000, 8089]}, stateful: true}
  - {ctid: 110,  node: node1, name: atlas-networkvisualizer, tier: 0, pre_state: stopped, snap_strategy: detach-snap-attach,  probes: {http: [{port: 80, path: "/"}]}}
  - {ctid: 118,  node: node2, name: ai-agents,               tier: 0, pre_state: stopped, snap_strategy: no-bind,             probes: {}}
  - {ctid: 120,  node: node1, name: homepage-dashboard,      tier: 0, pre_state: stopped, snap_strategy: detach-snap-attach,  probes: {http: [{port: 3000, path: "/"}]}}
  - {ctid: 130,  node: node2, name: terraform-aws,           tier: 0, pre_state: stopped, snap_strategy: no-bind,             probes: {}}
  - {ctid: 200,  node: node1, name: mcp-server,              tier: 0, pre_state: stopped, snap_strategy: detach-snap-attach,  probes: {}}
  - {ctid: 300,  node: node1, name: elk-demo,                tier: 0, pre_state: stopped, snap_strategy: no-bind,             probes: {tcp: [9200, 5601]}, stateful: true}
  - {ctid: 302,  node: node2, name: oci-demo,                tier: 0, pre_state: stopped, snap_strategy: no-bind,             probes: {}}

