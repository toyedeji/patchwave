  # ct102 runs `glance` (Go dashboard) on :8080 — NOT `glances` (Python) on :61208.
  # No body assertion: glance serves text/html without a stable substring.
  - {ctid: 102,  node: node1, name: glance,                  tier: 1, pre_state: running, snap_strategy: no-bind,              probes: {http: [{port: 8080, path: "/"}]}}
