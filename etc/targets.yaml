  - {ctid: 211,  node: node2, name: hermes-agents-1,         tier: 3, pre_state: running, snap_strategy: deferred,             probes: {docker_running: true}, stateful: true, approval_gated: true, never_auto: true, slot: "own-slot; supervisor host; never auto", refine: "TIGHTEN before gated run — add per-agent health endpoint check (vulcan host)"}
  # ct125 patchmon: 200 + 'patchmon' or 'PatchMon' substring confirms SPA is served (not generic nginx).
  - {ctid: 125,  node: node2, name: patchmon,                tier: 3, pre_state: running, snap_strategy: fix-forward-enhanced, probes: {http: [{port: 3000, path: "/", expect_status: 200, expect_body_substr: "patchmon"}]}, stateful: true, approval_gated: true, never_auto: true, slot: "own-slot-after-211; source-of-truth"}
