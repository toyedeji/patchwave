# PatchWave runner configuration
# Edit and `systemctl daemon-reload` if changing timer schedule.

[runner]
state_dir = /opt/patchwave/state
log_dir = /var/log/patchwave
targets_file = /opt/patchwave/etc/targets.yaml
node2_local = true
node1_ssh = root@<PROXMOX_NODE1_IP>
snapshot_prefix = patchwave
max_concurrency = 1
# Halt after the first CT completes its pipeline. Operator must
# `patchwave-run --release` before the queue continues.
halt_after_canary = true
# Power-restore policy: match pre-run state.
power_restore = match_pre_state

[patch]
# security-only by default; honor apt-mark holds; OS packages only.
scope = security-only
honor_holds = true
include_recommends = false
dpkg_options = --force-confdef,--force-confold

[probes]
# Default timeouts for probe families.
tcp_timeout_sec = 5
http_timeout_sec = 10
boot_wait_sec = 60
post_patch_settle_sec = 15

[report]
# Phase-1 report destination is the fallback markdown at log_dir/report-YYYYMMDD.md.
# Slack push is OPTIONAL and non-blocking: if slack_webhook_url is empty, no push
# is attempted and the daily run still succeeds. Cowork narrative is a later layer.
slack_webhook_url =
report_time = 07:15

[vulcan]
# Supervisor persona endpoint (CT 211 Hermes agent). Phase-1 advisory only.
endpoint = http://<HERMES_AGENTS_IP>:8000/vulcan/observe
enabled = false

[preflight]
# Defects acknowledged at Phase-0 review.
patchmon_recycle_before_golive = true
patchmon_compose_path = /opt/patchmon
